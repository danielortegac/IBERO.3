    <style>
      :root {
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
      }
      
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        box-sizing: border-box;
      }

      html, body {
        height: 100% !important;
        height: 100dvh !important;
        width: 100vw;
        margin: 0;
        padding: 0;
        overflow: hidden !important;
        background-color: #F9FAFB; /* Color de la app */
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      
      .dark html, .dark body {
        background-color: #0f172a;
      }

      #root { 
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100dvh; 
        width: 100vw; 
        overflow: hidden; 
        background-color: inherit;
      }

      #root-loader {
        position: fixed;
        inset: 0;
        background-color: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .loader-logo {
        width: 80px;
        height: 80px;
        background: url("https://firebasestorage.googleapis.com/v0/b/goatify-app-ia.firebasestorage.app/o/Logos%20HD.png?alt=media&token=293a80b4-b5b8-4249-8d57-cc4925598747") no-repeat center/contain;
        animation: breath 2s infinite ease-in-out;
      }
      @keyframes breath { 
        0%, 100% { transform: scale(1); opacity: 1; } 
        50% { transform: scale(1.1); opacity: 0.8; } 
      }

      /* Estilización Global de Scrollbars v14.1 - 1px de grosor */
      ::-webkit-scrollbar {
        width: 1px;
        height: 1px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #9ca3af;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: #9ca3af transparent;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      /* --- NUEVOS ESTILOS: NEURAL GLOW (ALTER EGO) --- */
      .neural-glow {
        position: relative;
        overflow: visible !important;
        border: none !important;
      }
      .neural-glow::before {
        content: '';
        position: absolute;
        inset: -2px;
        z-index: -1;
        background: conic-gradient(from 0deg, #8b5cf6, #06b6d4, #d946ef, #8b5cf6);
        border-radius: inherit;
        animation: neural-rotate 6s linear infinite;
        opacity: 0.7;
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask-composite: exclude;
      }
      @keyframes neural-rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .neural-text {
        font-style: italic;
        line-height: 1.6;
        letter-spacing: 0.01em;
        opacity: 0.95;
      }
      .neural-pulse {
        animation: neural-pulse 3s ease-in-out infinite;
      }
      @keyframes neural-pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }
    </style>
